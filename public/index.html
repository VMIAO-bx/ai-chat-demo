<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI聊天助手</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI助手">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #f5f5f5;
            overflow: hidden;
        }

        .header {
            background: #007aff;
            color: white;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .role-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e5e5ea;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .role-btn {
            background: #f5f5f5;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            color: #333;
        }

        .role-btn.active {
            background: #007aff;
            color: white;
        }

        .role-btn:active {
            transform: scale(0.95);
        }

        .role-clear:active {
            background: rgba(255, 59, 48, 0.1);
            transform: scale(0.95);
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            /* 关键：允许 flex 子项收缩 */
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .user {
            background: #007aff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai {
            background: #e5e5ea;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            background: #e5e5ea;
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #8e8e93;
            border-radius: 50%;
            display: inline-block;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typingBounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #e5e5ea;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            overflow: hidden;
            min-height: 42px;
            max-height: 100px;
            background: #f8f8f8;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #007aff;
            background: white;
        }

        .input-area button {
            background: #007aff;
            border: none;
            padding: 0 20px;
            border-radius: 24px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-area button:disabled {
            background: #a0c4ff;
            cursor: not-allowed;
        }

        .input-area button:not(:disabled):active {
            transform: scale(0.96);
            background: #005bb5;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="header">
            <h2>🤖 AI聊天助手</h2>
            <p>基于 DeepSeek · 流式输出</p>
        </div>

        <div class="role-bar">
            <button id="role-default" class="role-btn active" onclick="changeRole('default')">💬 通用助手</button>
            <button id="role-translator" class="role-btn" onclick="changeRole('translator')">🌐 翻译助手</button>
            <button id="role-coder" class="role-btn" onclick="changeRole('coder')">💻 代码助手</button>
            <button id="role-friend" class="role-btn" onclick="changeRole('friend')">❤️ 情感树洞</button>
            <button class="role-btn role-clear" onclick="clearHistory()">🗑️ 清空对话</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <textarea id="messageInput" placeholder="输入你的问题..." rows="1"></textarea>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const rolePrompts = {
            default: '你是一个乐于助人的AI助手。',
            translator: '你是一个专业的翻译助手。请将用户输入的内容翻译成中文（如果是英文）或英文（如果是中文）。只输出翻译结果，不要添加解释。',
            coder: '你是一个资深程序员。用中文回答问题，并提供代码示例。解释要清晰易懂。',
            friend: '你是一个温暖的朋友。倾听用户的烦恼，给予情感支持和鼓励。用轻松亲切的语气回应。'
        };

        let currentRole = 'default';
        let conversationHistory = [
            { role: 'system', content: rolePrompts.default }
        ];

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            messageInput.value = '';
            conversationHistory.push({ role: 'user', content: message });

            // 禁用发送按钮，防止并发请求
            sendBtn.disabled = true;

            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message ai';
            aiMessageDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatBox.appendChild(aiMessageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            let fullReply = '';
            let isFirstChunk = true;

            try {
                const response = await fetch('https://ai-chat-demo-production.up.railway.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: conversationHistory
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);

                    if (isFirstChunk && text) {
                        aiMessageDiv.innerHTML = '';
                        isFirstChunk = false;
                    }

                    if (text) {
                        const cleanText = text.replace(/\*/g, '');
                        fullReply += cleanText;
                        aiMessageDiv.textContent = fullReply;
                        requestAnimationFrame(() => {
                            chatBox.scrollTop = chatBox.scrollHeight;
                        });
                    }
                }

                if (isFirstChunk) {
                    // 没收到任何内容，把之前推入的用户消息也撤回
                    conversationHistory.pop();
                    aiMessageDiv.textContent = '抱歉，没有收到回复，请重试。';
                } else {
                    conversationHistory.push({ role: 'assistant', content: fullReply });
                }

            } catch (error) {
                // 请求失败，撤回用户消息，保持历史对称
                conversationHistory.pop();
                aiMessageDiv.textContent = '抱歉，出错了：' + error.message;
            } finally {
                sendBtn.disabled = false;
            }
        }

        function clearHistory() {
            // 用当前角色的 system prompt 重置，而不是写死默认
            conversationHistory = [
                { role: 'system', content: rolePrompts[currentRole] }
            ];
            chatBox.innerHTML = '<div class="message ai">对话已清空，我们可以重新开始。有什么想问的吗？</div>';
        }

        function changeRole(role) {
            currentRole = role;

            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            const roleMap = {
                default: 'role-default',
                translator: 'role-translator',
                coder: 'role-coder',
                friend: 'role-friend'
            };
            document.getElementById(roleMap[role]).classList.add('active');

            conversationHistory = [
                { role: 'system', content: rolePrompts[role] }
            ];

            const welcomeMap = {
                default: '已切换为通用助手，有什么可以帮你的？',
                translator: '已切换为翻译助手，请发送需要翻译的内容。',
                coder: '已切换为代码助手，有什么编程问题？',
                friend: '已切换为情感树洞，有什么想聊的吗？'
            };
            chatBox.innerHTML = `<div class="message ai">${welcomeMap[role]}</div>`;
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker 注册成功', reg))
                    .catch(err => console.log('Service Worker 注册失败', err));
            });
        }
    </script>
</body>

</html>
