<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <!-- 移动端页面适配+允许用户缩放页面 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI聊天助手</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI助手">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 主容器 - 使用 flex 布局占满全屏 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #f5f5f5;
        }

        /* 头部区域 */
        .header {
            background: #007aff;
            color: white;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* 角色按钮栏 - 横向滚动 */
        .role-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e5e5ea;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        /* 角色按钮栏 */
        .role-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e5e5ea;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        /* 所有角色按钮的基础样式 */
        .role-btn {
            background: #f5f5f5;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            color: #333;
        }

        /* 选中状态（蓝色背景白色文字） */
        .role-btn.active {
            background: #007aff;
            color: white;
        }

        /* 点击反馈 */
        .role-btn:active {
            transform: scale(0.95);
        }

        .role-clear:active {
            background: rgba(255, 59, 48, 0.1);
            transform: scale(0.95);
        }


        /* 聊天区域 - 可滚动 */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 消息气泡 */
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        /* 用户消息 - 蓝色，靠右 */
        .user {
            background: #007aff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* AI 消息 - 灰色，靠左 */
        .ai {
            background: #e5e5ea;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* 加载提示 */
        .loading {
            color: #8e8e93;
            font-style: italic;
            font-size: 14px;
            padding: 8px 12px;
            align-self: flex-start;
        }

        /* 底部输入区域 */
        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #e5e5ea;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            overflow: hidden;
            min-height: 42px;
            max-height: 100px;
            background: #f8f8f8;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #007aff;
            background: white;
        }

        .input-area button {
            background: #007aff;
            border: none;
            padding: 0 20px;
            border-radius: 24px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-area button:active {
            transform: scale(0.96);
            background: #005bb5;
        }
    </style>
</head>

<body>

    <body>
        <div class="app-container">
            <div class="header">
                <h2>🤖 AI聊天助手</h2>
                <p>基于 DeepSeek · 流式输出</p>
            </div>

            <div class="role-bar">
                <button id="role-default" class="role-btn active" onclick="changeRole('default')">💬 通用助手</button>
                <button id="role-translator" class="role-btn" onclick="changeRole('translator')">🌐 翻译助手</button>
                <button id="role-coder" class="role-btn" onclick="changeRole('coder')">💻 代码助手</button>
                <button id="role-friend" class="role-btn" onclick="changeRole('friend')">❤️ 情感树洞</button>
                <button class="role-btn role-clear" onclick="clearHistory()">🗑️ 清空对话</button>
            </div>

            <div class="chat-box" id="chatBox"></div>

            <div class="input-area">
                <textarea id="messageInput" placeholder="输入你的问题..." rows="1"></textarea>
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <!-- 后面跟上你原来的 JavaScript 代码 -->
    </body>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');

        // 核心修改1：维护对话历史（存储用户和AI的所有消息）
        let conversationHistory = [
            { role: 'system', content: '你是一个乐于助人的AI助手。' },
            { role: 'assistant', content: '你好！我是AI助手，有什么可以帮你的？' }
        ];

        // 当前选中的角色（用于后续角色预设功能）
        let currentRole = 'default';

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 显示用户消息
            addMessage(message, 'user');
            messageInput.value = '';

            // 核心修改2：将用户消息加入历史记录
            conversationHistory.push({ role: 'user', content: message });

            // 创建一个空的AI消息容器
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message ai';
            aiMessageDiv.textContent = '';
            chatBox.appendChild(aiMessageDiv);

            try {
                // 核心修改3：发送完整的对话历史给后端
                const response = await fetch('https://ai-chat-demo-production.up.railway.app/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,           // 保留原有字段以兼容后端
                        history: conversationHistory // 新增：发送完整历史
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullReply = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    aiMessageDiv.textContent += text;
                    fullReply += text;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                // 核心修改4：将AI的回复也加入历史记录
                if (fullReply) {
                    conversationHistory.push({ role: 'assistant', content: fullReply });
                }

            } catch (error) {
                aiMessageDiv.textContent = '抱歉，出错了：' + error.message;
            }
        }

        // 新增：清除对话历史的功能
        function clearHistory() {
            conversationHistory = [
                { role: 'system', content: '你是一个乐于助人的AI助手。' },
                { role: 'assistant', content: '对话已清空，我们可以重新开始。有什么想问的吗？' }
            ];
            // 清空聊天界面，只保留欢迎消息
            chatBox.innerHTML = '<div class="message ai">对话已清空，我们可以重新开始。有什么想问的吗？</div>';
        }
        // 角色预设配置
        const rolePrompts = {
            default: '你是一个乐于助人的AI助手。',
            translator: '你是一个专业的翻译助手。请将用户输入的内容翻译成中文（如果是英文）或英文（如果是中文）。只输出翻译结果，不要添加解释。',
            coder: '你是一个资深程序员。用中文回答问题，并提供代码示例。解释要清晰易懂。',
            friend: '你是一个温暖的朋友。倾听用户的烦恼，给予情感支持和鼓励。用轻松亲切的语气回应。'
        };

        function changeRole(role) {
            currentRole = role;

            // 更新按钮的选中样式
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 根据角色给对应的按钮添加 active 类
            const roleMap = {
                'default': 'role-default',
                'translator': 'role-translator',
                'coder': 'role-coder',
                'friend': 'role-friend'
            };
            document.getElementById(roleMap[role]).classList.add('active');

            // 切换 system prompt
            conversationHistory = [
                { role: 'system', content: rolePrompts[role] },
                { role: 'assistant', content: `角色已切换为${role === 'translator' ? '翻译助手' : role === 'coder' ? '代码助手' : role === 'friend' ? '情感树洞' : '通用助手'}。${role === 'translator' ? '请发送需要翻译的内容。' : role === 'coder' ? '有什么编程问题？' : role === 'friend' ? '有什么想聊的吗？' : '有什么可以帮你的？'}` }
            ];

            // 刷新聊天界面
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = `<div class="message ai">${conversationHistory[1].content}</div>`;
        }
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker 注册成功', reg))
                    .catch(err => console.log('Service Worker 注册失败', err));
            });
        }
    </script>
</body>

</html>
